apiVersion: apps/v1
kind: Deployment
metadata:
  name: nc-postgres
  namespace: cognos-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nc-postgres
  template:
    metadata:
      labels:
        app: nc-postgres
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name: postgres-storage
              subPath: nc
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16
          securityContext:
            privileged: true
            runAsUser: 0
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: cm
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres123
          volumeMounts:
            - name: postgres-storage
              subPath: nc
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: cognos-databases-pvc
---

apiVersion: v1
kind: Service
metadata:
  name: ca-nc
  namespace: cognos-ns
spec:
  selector:
    app: nc-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---

