# Services + Endpoints so cluster can reach Postgres running on host (docker-compose).
# Host IP from inside Minikube: update if your host.minikube.internal differs
#   minikube ssh -- getent hosts host.minikube.internal
# Apply after: docker compose -f docker-compose-postgres.yml up -d
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ca-nc
  namespace: cognos-ns
subsets:
  - addresses:
      - ip: 192.168.58.1
    ports:
      - port: 25432
        name: pg
---
apiVersion: v1
kind: Service
metadata:
  name: ca-nc
  namespace: cognos-ns
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 25432
      protocol: TCP
      name: pg
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ca-audit-store
  namespace: cognos-ns
subsets:
  - addresses:
      - ip: 192.168.58.1
    ports:
      - port: 25433
        name: pg
---
apiVersion: v1
kind: Service
metadata:
  name: ca-audit-store
  namespace: cognos-ns
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 25433
      protocol: TCP
      name: pg
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ca-cs
  namespace: cognos-ns
subsets:
  - addresses:
      - ip: 192.168.58.1
    ports:
      - port: 25434
        name: pg
---
apiVersion: v1
kind: Service
metadata:
  name: ca-cs
  namespace: cognos-ns
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 25434
      protocol: TCP
      name: pg
